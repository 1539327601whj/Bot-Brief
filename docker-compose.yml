services:
  backend:
    build:
      context: ./backend
    container_name: bot-brief-backend
    ports:
      - "127.0.0.1:8081:8081"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SERVER_PORT: "8081"
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS:-168}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DEMO_ENABLED: ${DEMO_ENABLED:-false}
      DEMO_EMAIL: ${DEMO_EMAIL:-demo@example.com}
      DEMO_DISPLAY_NAME: ${DEMO_DISPLAY_NAME:-公开演示账号}
      DEMO_TOKEN_EXPIRATION_MINUTES: ${DEMO_TOKEN_EXPIRATION_MINUTES:-30}
      REPORT_INGEST_TOKEN: ${REPORT_INGEST_TOKEN}
      PUSH_CHANNEL_ENCRYPTION_KEY: ${PUSH_CHANNEL_ENCRYPTION_KEY:-}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-BriefMind}
    restart: always

  frontend:
    build:
      context: ./frontend
    container_name: bot-brief-frontend
    ports:
      - "127.0.0.1:8080:80"
    restart: always

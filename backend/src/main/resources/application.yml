spring:
  application:
    name: ai-daily-backend

  datasource:
    # TiDB Serverless 默认端口 4000，启用 SSL
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:4000}/${DB_NAME:ai_daily}?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=true&sslMode=VERIFY_IDENTITY&allowPublicKeyRetrieval=true&connectTimeout=10000&socketTimeout=30000
    username: ${DB_USER:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

  # 增加请求体大小限制（避免 400 input length too long）
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # QQ 邮箱 SMTP 推送（465 端口 SSL）
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory
            fallback: false

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

server:
  port: ${SERVER_PORT:8081}
  # 增加请求头大小限制
  max-http-request-header-size: 16KB

# 允许 GitHub Actions 跨域调用（开发时放开，生产环境建议配置具体域名）
allowed-origins: ${ALLOWED_ORIGINS:*}

# DeepSeek API 配置（用于 AI 对话功能）
# 未设置 DEEPSEEK_API_KEY 时使用空字符串，AI 对话会返回 401，但不影响其他功能
deepseek:
  api-key: ${DEEPSEEK_API_KEY:}
  model: ${DEEPSEEK_MODEL:deepseek-chat}
  base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}

# JWT 配置
jwt:
  # 生产必须通过 env 注入；本地开发用默认长字符串
  secret: ${JWT_SECRET:dev-secret-please-change-in-production-must-be-at-least-32-bytes-long}
  expiration-hours: ${JWT_EXPIRATION_HOURS:24}

# Admin 引导密码（首次启动写入 users[id=1].password_hash）
admin:
  email: ${ADMIN_EMAIL:whj1539327601@gmail.com}
  bootstrap-password: ${ADMIN_PASSWORD:changeme}

# 报告上报共享 token（GitHub Actions 用）
report:
  ingest-token: ${REPORT_INGEST_TOKEN:dev-ingest-token}

# 邮件推送发件人显示（可选）
mail-push:
  from-name: ${MAIL_FROM_NAME:BriefMind}

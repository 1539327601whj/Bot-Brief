name: Deploy Frontend

on:
  workflow_dispatch:
    inputs:
      branch:
        description: '要部署的分支'
        required: true
        default: 'main'
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy-frontend.yml'

permissions:
  contents: read

concurrency:
  group: bot-brief-server-deploy
  cancel-in-progress: false

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Frontend on Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          timeout: 30m
          command_timeout: 30m
          script: |
            set -e

            if ! command -v docker >/dev/null 2>&1; then
              curl -fsSL https://get.docker.com | bash -s docker --mirror Aliyun
              systemctl start docker
              systemctl enable docker
            fi

            cd /opt/Bot-Brief
            git fetch origin ${{ github.event.inputs.branch || github.ref_name }}
            git checkout ${{ github.event.inputs.branch || github.ref_name }}
            git reset --hard origin/${{ github.event.inputs.branch || github.ref_name }}

            docker rm -f bot-brief-frontend || true
            docker compose up -d --build frontend
            docker image prune -f

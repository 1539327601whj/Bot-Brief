name: Deploy Backend

on:
  workflow_dispatch:
    inputs:
      branch:
        description: '要部署的分支'
        required: true
        default: 'main'
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy-backend.yml'

permissions:
  contents: read

concurrency:
  group: bot-brief-server-deploy
  cancel-in-progress: false

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Backend on Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          timeout: 30m
          command_timeout: 30m
          script: |
            set -e

            if ! command -v docker >/dev/null 2>&1; then
              curl -fsSL https://get.docker.com | bash -s docker --mirror Aliyun
              systemctl start docker
              systemctl enable docker
            fi

            cd /opt/Bot-Brief
            git fetch origin ${{ github.event.inputs.branch || github.ref_name }}
            git checkout ${{ github.event.inputs.branch || github.ref_name }}
            git reset --hard origin/${{ github.event.inputs.branch || github.ref_name }}

            cat > .env.deploy <<'EOF'
            DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            EOF

            docker rm -f bot-brief-backend || true
            docker compose --env-file .env.deploy up -d --build backend
            docker image prune -f

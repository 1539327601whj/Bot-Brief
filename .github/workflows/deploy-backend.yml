name: Deploy Backend

on:
  workflow_dispatch:
    inputs:
      branch:
        description: '要部署的分支'
        required: true
        default: 'main'
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy-backend.yml'

permissions:
  contents: read

concurrency:
  group: bot-brief-server-deploy
  cancel-in-progress: false

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Backend on Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          timeout: 30m
          command_timeout: 30m
          script: |
            set -e

            if ! command -v docker >/dev/null 2>&1; then
              curl -fsSL https://get.docker.com | bash -s docker --mirror Aliyun
              systemctl start docker
              systemctl enable docker
            fi

            cd /opt/Bot-Brief
            git config --global http.version HTTP/1.1
            git config --global http.postBuffer 524288000
            for attempt in 1 2 3 4 5; do
              if git fetch --depth=1 origin ${{ github.event.inputs.branch || github.ref_name }}; then
                break
              fi
              if [ "$attempt" = "5" ]; then
                echo "Failed to fetch latest code after 5 attempts"
                exit 1
              fi
              echo "git fetch failed, retrying in 20 seconds... ($attempt/5)"
              sleep 20
            done
            git checkout ${{ github.event.inputs.branch || github.ref_name }}
            git reset --hard FETCH_HEAD

            cat > .env.deploy <<'EOF'
            DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRATION_HOURS=${{ secrets.JWT_EXPIRATION_HOURS }}
            ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
            ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
            DEMO_ENABLED=${{ vars.DEMO_ENABLED || 'false' }}
            DEMO_EMAIL=${{ vars.DEMO_EMAIL || 'demo@example.com' }}
            DEMO_DISPLAY_NAME=${{ vars.DEMO_DISPLAY_NAME || '公开演示账号' }}
            DEMO_TOKEN_EXPIRATION_MINUTES=${{ vars.DEMO_TOKEN_EXPIRATION_MINUTES || '30' }}
            REPORT_INGEST_TOKEN=${{ secrets.REPORT_INGEST_TOKEN }}
            PUSH_CHANNEL_ENCRYPTION_KEY=${{ secrets.PUSH_CHANNEL_ENCRYPTION_KEY }}
            MAIL_HOST=${{ secrets.MAIL_HOST }}
            MAIL_PORT=${{ secrets.MAIL_PORT }}
            MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
            MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
            MAIL_FROM_NAME=${{ secrets.MAIL_FROM_NAME }}
            EOF

            docker rm -f bot-brief-backend || true
            docker compose --env-file .env.deploy up -d --build backend
            docker image prune -f
